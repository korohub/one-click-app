captainVersion: 4

services:
  $$cap_appname-db:
    image: postgis/postgis:$$cap_pg_version-$$cap_postgis_version
    volumes:
      - $$cap_appname-db-data:/var/lib/postgresql/data
    restart: always
    environment:
      POSTGRES_USER: $$cap_pg_user
      POSTGRES_PASSWORD: $$cap_pg_password
      POSTGRES_DB: $$cap_pg_db
      POSTGRES_INITDB_ARGS: $$cap_pg_initdb_args
    caproverExtra:
      notExposeAsWebApp: "true"

caproverOneClickApp:
  variables:
    - id: $$cap_pg_version
      label: PostgreSQL Version
      defaultValue: "16"
      description: >-
        Version majeure de PostgreSQL. Doit correspondre à un tag disponible
        sur postgis/postgis (ex: 16, 15, 14).
      validRegex: /^\d+$/
    - id: $$cap_postgis_version
      label: PostGIS Version
      defaultValue: "3.5"
      description: >-
        Version de PostGIS. Combinée avec la version PG pour former le tag
        de l'image (ex: 16-3.5 -> postgis/postgis:16-3.5).
      validRegex: /^\d+\.\d+$/
    - id: $$cap_pg_user
      label: PostgreSQL User
      defaultValue: postgres
      validRegex: /^[a-zA-Z][a-zA-Z0-9_]+$/
    - id: $$cap_pg_password
      label: PostgreSQL Password
      defaultValue: $$cap_gen_random_hex(16)
      description: Mot de passe pour l'utilisateur PostgreSQL.
      validRegex: /.{8,}/
    - id: $$cap_pg_db
      label: Nom de la base de données
      defaultValue: postgres
      validRegex: /^[a-zA-Z][a-zA-Z0-9_]+$/
    - id: $$cap_pg_initdb_args
      label: Arguments INITDB (optionnel)
      description: >-
        Arguments supplémentaires pour initdb (ex: --data-checksums).
        Recommandé : --data-checksums pour préparer une future réplication Patroni.
      defaultValue: "--data-checksums"
  instructions:
    start: >-
      PostgreSQL avec l'extension PostGIS pré-installée.

      L'image officielle postgis/postgis est utilisée.
      L'option --data-checksums est activée par défaut pour faciliter
      une future migration vers Patroni (haute disponibilité).
    end: >-
      PostgreSQL + PostGIS est déployé !

      **Connexion interne :**
      - Host : srv-captain--$$cap_appname-db
      - Port : 5432
      - User : $$cap_pg_user
      - Database : $$cap_pg_db

      **Activer PostGIS dans votre base :**
      ```sql
      CREATE EXTENSION IF NOT EXISTS postgis;
      ```

      Note : pour une future haute disponibilité avec Patroni,
      les data checksums sont activés par défaut.
  displayName: PostgreSQL + PostGIS
  description: PostgreSQL avec l'extension spatiale PostGIS. Prêt pour une future HA avec Patroni.
  isOfficial: false
  documentation: https://registry.hub.docker.com/r/postgis/postgis
